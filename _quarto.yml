project:
  type: website
  output-dir: docs

lang: pt-BR

language:
  search-no-results-text: "Nenhum resultado"
  search-matching-documents-text: "documentos correspondentes"
  search-copy-link-title: "Copiar link para a busca"
  search-hide-matches-text: "Esconder correspondências adicionais"
  search-more-match-text: "mais correspondência neste documento"
  search-more-matches-text: "mais correspondências neste documento"
  search-clear-button-title: "Limpar"
  search-text-placeholder: ""
  search-detached-cancel-button-title: "Cancelar"
  search-submit-button-title: "Enviar"
  search-label: "Procurar"

website:
  title: "Indicadores de Saúde"
  description: |
    Conceitos, métodos e aplicações com dados do Brasil.
    Material didático sobre indicadores de saúde, com exemplos reproduzíveis em R.
  site-url: https://henriquealvarenga.com/indicadores
  repo-url: https://github.com/henriquealvarenga/indicadores-de-saude
  repo-actions: [edit, issue]
  reader-mode: false
  back-to-top-navigation: true
  page-navigation: true
  search:
    location: navbar
    type: overlay
    copy-button: false

  navbar:
    background: dark
    pinned: true
    collapse-below: lg
    logo: images/logo.svg
    logo-alt: "Indicadores de Saúde"
    title: false
    left:
      - text: "<i class='bi bi-house'></i> Início"
        href: index.qmd
      - text: "Fundamentos"
        menu:
          - text: "<i class='bi bi-book'></i> O que são indicadores de saúde?"
            href: chapters/01-introducao.qmd
          - text: "<i class='bi bi-gender-female'></i> Fecundidade e natalidade"
            href: chapters/02-fecundidade-natalidade.qmd
          - text: "<i class='bi bi-heart-pulse'></i> Mortalidade"
            href: chapters/03-mortalidade.qmd
      - text: "Indicadores Avançados"
        menu:
          - text: "<i class='bi bi-thermometer-half'></i> Morbidade"
            href: chapters/04-morbidade.qmd
          - text: "<i class='bi bi-shield-plus'></i> Cobertura vacinal"
            href: chapters/05-cobertura-vacinal.qmd
          - text: "<i class='bi bi-rulers'></i> Padronização de taxas"
            href: chapters/06-padronizacao.qmd
      - text: "Contexto Brasileiro"
        menu:
          - text: "<i class='bi bi-arrow-repeat'></i> Transição epidemiológica"
            href: chapters/07-transicao-epidemiologica.qmd
          - text: "<i class='bi bi-geo-alt'></i> Atenção Primária à Saúde"
            href: chapters/08-atencao-primaria.qmd
          - text: "<i class='bi bi-people'></i> Desigualdades raciais"
            href: chapters/09-desigualdades-raca.qmd
      - text: "Pensamento Crítico"
        menu:
          - text: "<i class='bi bi-exclamation-diamond'></i> Limitações dos indicadores"
            href: chapters/10-limitacoes.qmd
          - text: "<i class='bi bi-check-circle'></i> Uso responsável dos dados"
            href: chapters/11-uso-responsavel.qmd
      - text: "Referências"
        href: references.qmd
    right:
      - text: "<i class='bi bi-clipboard-data'></i> Metodologia"
        href: metodologia.qmd
      - text: "<i class='bi bi-info-circle'></i> Sobre"
        href: about.qmd

  sidebar:
    style: floating
    align: left
    collapse-level: 2
    contents:
      - section: "Fundamentos"
        contents:
          - chapters/01-introducao.qmd
          - chapters/02-fecundidade-natalidade.qmd
          - chapters/03-mortalidade.qmd
      - section: "Indicadores Avançados"
        contents:
          - chapters/04-morbidade.qmd
          - chapters/05-cobertura-vacinal.qmd
          - chapters/06-padronizacao.qmd
      - section: "Contexto Brasileiro"
        contents:
          - chapters/07-transicao-epidemiologica.qmd
          - chapters/08-atencao-primaria.qmd
          - chapters/09-desigualdades-raca.qmd
      - section: "Pensamento Crítico"
        contents:
          - chapters/10-limitacoes.qmd
          - chapters/11-uso-responsavel.qmd
      - references.qmd
      - metodologia.qmd
      - about.qmd

  page-footer:
    background: light
    left: |
      Indicadores de Saúde<br>© 2026 [Henrique Alvarenga da Silva](https://henriquealvarenga.com)
    center: |
      Material didático de acesso livre — edição do autor
    right: |
      Feito com [Quarto](https://quarto.org/) e [R](https://www.r-project.org/)

bibliography: references.bib
csl: references/csl_styles/ABNT.csl
cite-method: citeproc

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    code-fold: true
    code-summary: "Mostrar código R"
    code-tools: false
    code-overflow: wrap
    code-line-numbers: true
    highlight-style: github
    fig-responsive: true
    fig-align: center
    fig-width: 8
    fig-height: 5
    df-print: kable
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    fontsize: 1rem
    linestretch: 1.6
    mainfont: "Nunito Sans, sans-serif"
    monofont: "Fira Code, monospace"
    include-in-header:
      - text: |
          <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

execute:
  echo: true
  warning: false
  message: false
  cache: true
  freeze: auto

knitr:
  opts_chunk:
    fig.retina: 2
    dpi: 150
    out.width: "100%"
    comment: "#>"
